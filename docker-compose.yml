services:
  app:
    build: .
    ports:
      - "${HOST_PORT:-39327}:39327"
    environment:
      CONTROL_PLANE_ADMIN_PASSWORD: ${CONTROL_PLANE_ADMIN_PASSWORD}
      CONTROL_PLANE_DEPLOY_MODE: ${CONTROL_PLANE_DEPLOY_MODE:-}
      CONTROL_PLANE_SCHEDULER_ENABLED: ${CONTROL_PLANE_SCHEDULER_ENABLED:-}
      CONTROL_PLANE_SESSION_SECRET: ${CONTROL_PLANE_SESSION_SECRET:?CONTROL_PLANE_SESSION_SECRET is required}
      CONTROL_PLANE_INTERNAL_TOKEN: ${CONTROL_PLANE_INTERNAL_TOKEN:?CONTROL_PLANE_INTERNAL_TOKEN is required}
      CONTROL_PLANE_STORAGE_MODE: persistent
      CONTROL_PLANE_DATA_DIR: /app/runtime_data
      CONTROL_PLANE_BROWSER_ENABLED: "true"
      NUXT_CONTROL_PLANE_URL: http://127.0.0.1:18080
      NUXT_CONTROL_PLANE_TOKEN: ${CONTROL_PLANE_INTERNAL_TOKEN:?CONTROL_PLANE_INTERNAL_TOKEN is required}
      NUXT_SESSION_SECRET: ${CONTROL_PLANE_SESSION_SECRET:?CONTROL_PLANE_SESSION_SECRET is required}
    volumes:
      - runtime_data:/app/runtime_data
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - |
          from urllib.request import urlopen
          raise SystemExit(0 if urlopen("http://127.0.0.1:39327/api/auth/session", timeout=3).status == 200 else 1)
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

volumes:
  runtime_data:
